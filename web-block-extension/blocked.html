<!DOCTYPE html>
<html>

<head>
    <title>Site Blocked - BlitzIt</title>
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #334155;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
        }

        h1 {
            color: #ef4444;
            font-size: 2rem;
            margin: 0 0 1rem 0;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
            color: #475569;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>Site Blocked</h1>
        <p>This site is blocked.<br>Focus Mode is active.</p>
        <a href="javascript:history.back()" class="btn">Go Back</a>
    </div>
</body>

</html>
