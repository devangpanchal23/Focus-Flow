version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - '5000:5000'
    restart: unless-stopped
    networks:
      - appnet

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - '80:80'
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
  backend-core:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    networks:
      - backend_internal
    restart: unless-stopped
    # Note: No ports exposed to host. Traffic must go through api-gateway.
