version: '3.8'

networks:
  backend_internal:
    driver: bridge

services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443" # Uncomment when setting up SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend_internal
    depends_on:
      - backend-core
    restart: unless-stopped

  backend-core:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    networks:
      - backend_internal
    restart: unless-stopped
    # Note: No ports exposed to host. Traffic must go through api-gateway.
