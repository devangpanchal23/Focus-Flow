worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Upstream definition for the Node.js backend
    upstream backend {
        server backend-core:5001;
    }

    server {
        listen 80;
        server_name localhost;

        # Route API requests to the backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Security headers
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint for the Gateway itself
        location /health {
            access_log off;
            return 200 'Gateway is healthy\n';
        }

        # Any other routes (like frontend) can be routed elsewhere if needed
        # For now, return 404 for non-API routes at the Gateway level 
        # (Assuming frontend is served separately or via CDN)
        location / {
            return 404;
        }
    }
}
